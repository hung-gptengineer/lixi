<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lì Xì Thân Hữu 2026</title>
    <style>
        :root {
            --red: #d63031;
            --gold: #feca57;
            --bg: #fff5f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }
        h1 { color: var(--red); margin-bottom: 5px; }
        #msg { color: #636e72; font-style: italic; margin-bottom: 20px; min-height: 1.2em; }

        .screen { display: none; }
        .active { display: block; }

        /* Setup Screen */
        .box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid #ffeaa7;
        }
        textarea {
            width: 100%; height: 120px; border: 2px solid #eee;
            border-radius: 12px; padding: 12px; box-sizing: border-box;
            font-size: 16px; margin: 15px 0; outline: none;
        }
        button {
            background: var(--red); color: white; border: none;
            padding: 12px 25px; border-radius: 30px; cursor: pointer;
            font-weight: bold; font-size: 16px;
        }
        
        .share-area {
            margin-top: 20px; padding: 15px; background: #fff9db;
            border: 2px dashed #fab1a0; border-radius: 10px;
            word-break: break-all; text-align: left;
        }

        /* Play Screen Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* 3D Flip Card */
        .envelope {
            width: 100%; height: 160px;
            perspective: 1000px;
            cursor: pointer;
        }
        .envelope-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .envelope.is-flipped .envelope-inner {
            transform: rotateY(180deg);
        }
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; border: 3px solid var(--gold);
        }
        .front { background: var(--red); color: var(--gold); font-size: 50px; }
        .back {
            background: white; color: var(--red);
            transform: rotateY(180deg);
            font-size: 1.2rem; font-weight: bold;
            padding: 10px; box-sizing: border-box;
        }

        /* Khóa các bao không được chọn */
        .locked {
            opacity: 0.5;
            cursor: default;
            pointer-events: none;
        }

        /* --- POPUP MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: white; width: 80%; max-width: 350px;
            padding: 30px; border-radius: 20px; text-align: center;
            border: 5px solid var(--gold); animation: popDown 0.4s ease;
        }
        @keyframes popDown {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .prize-text { font-size: 2.2rem; margin: 20px 0; color: var(--red); font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen box">
        <h1>🧧 Chuẩn Bị Lì Xì</h1>
        <p>Nhập quà cho hội anh em/bạn dì nè</p>
        <textarea id="input-data" placeholder="20k, 50k, 1 chầu trà sữa..."></textarea>
        <button onclick="generateLink()">Xong rồi, lấy link thôi!</button>
        <div id="result-area" style="display:none">
            <div class="share-area">
                <strong>Gửi link này cho "đồng bọn" nhé:</strong>
                <p id="share-url" style="margin-top:5px; color:#d35400; font-size: 14px;"></p>
            </div>
            <button onclick="copyToClipboard()" style="background: #27ae60; margin-top: 10px; width: 100%;">Copy luôn cho lẹ</button>
        </div>
    </div>

    <div id="play-screen" class="screen">
        <h1>🧧 Lượm Quà Đi Chờ Chi!</h1>
        <p id="msg">Bạn chỉ được chọn duy nhất một bao thôi đó!</p>
        <div id="envelope-grid" class="grid"></div>
    </div>
</div>

<div id="modal" class="modal-overlay">
    <div class="modal-content">
        <h2>🎉 Chúc Mừng!</h2>
        <p>Phần quà của bạn là:</p>
        <div class="prize-text" id="modal-prize"></div>
        <p>Năm mới vui vẻ, vạn sự như ý!</p>
        <button onclick="closeModal()" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">Tuyệt vời</button>
    </div>
</div>

<script>
    let chosenIndex = null; // Lưu vị trí bao đã chọn

    function b64EncodeUnicode(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
    }
    function b64DecodeUnicode(str) {
        return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        if (dataParam) {
            try {
                initGame(JSON.parse(b64DecodeUnicode(dataParam)));
            } catch (e) { document.getElementById('setup-screen').classList.add('active'); }
        } else {
            document.getElementById('setup-screen').classList.add('active');
        }
    };

    function generateLink() {
        const prizes = document.getElementById('input-data').value.split(',').map(i => i.trim()).filter(i => i !== "");
        if (prizes.length === 0) return alert("Chưa nhập quà kìa!");
        const finalUrl = window.location.origin + window.location.pathname + '?data=' + b64EncodeUnicode(JSON.stringify(prizes));
        document.getElementById('share-url').innerText = finalUrl;
        document.getElementById('result-area').style.display = 'block';
    }

    function initGame(prizes) {
        document.getElementById('play-screen').classList.add('active');
        const grid = document.getElementById('envelope-grid');
        const shuffled = [...prizes].sort(() => Math.random() - 0.5);

        shuffled.forEach((prize, index) => {
            const div = document.createElement('div');
            div.className = 'envelope';
            div.id = 'env-' + index;
            div.innerHTML = `<div class="envelope-inner"><div class="front">🧧</div><div class="back">${prize}</div></div>`;
            
            div.onclick = function() {
                // Nếu chưa chọn bao nào
                if (chosenIndex === null) {
                    chosenIndex = index;
                    this.classList.add('is-flipped');
                    
                    // Khóa tất cả các bao khác
                    document.querySelectorAll('.envelope').forEach((el, idx) => {
                        if (idx !== chosenIndex) el.classList.add('locked');
                    });

                    setTimeout(() => {
                        document.getElementById('modal-prize').innerText = prize;
                        document.getElementById('modal').style.display = 'flex';
                        document.getElementById('msg').innerText = "Đây là quà của bạn! 🧧";
                    }, 700);
                } else if (chosenIndex === index) {
                    // Nếu bấm lại chính bao đã mở thì cho phép úp/mở lại
                    this.classList.toggle('is-flipped');
                }
            };
            grid.appendChild(div);
        });
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('share-url').innerText);
        alert("Đã copy!");
    }
</script>
</body>
</html>
